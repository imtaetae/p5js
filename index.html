<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나의 p5.js 작품 모음</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 20px 40px;
      font-family: 'Segoe UI', sans-serif;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }
    header h1 {
      font-size: 2rem;
      color: #f0c040;
      letter-spacing: 0.04em;
      text-shadow: 0 0 20px rgba(240,192,64,0.4);
    }
    header p {
      margin-top: 8px;
      color: #aaa;
      font-size: 0.95rem;
    }

    #projects {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      width: 100%;
      max-width: 660px;
    }

    .cell {
      display: flex;
      flex-direction: column;
      gap: 0;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 6px 30px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.08);
      background: #1a1a2e;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .cell:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(240,192,64,0.2);
    }

    .cell-label {
      padding: 10px 14px 8px;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .cell-label .num {
      font-size: 0.72rem;
      color: #f0c040;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .cell-label .title {
      font-size: 0.88rem;
      color: #ddd;
      margin-top: 2px;
    }

    .iframe-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
    }
    .iframe-wrap iframe {
      position: absolute;
      top: 0; left: 0;
      width: 600px;
      height: 400px;
      border: none;
      transform-origin: top left;
      transform: scale(0.5);
    }

    footer {
      margin-top: 32px;
      color: #555;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>🎨 나의 p5.js 작품 모음</h1>
    <p>imtaetae · 2025</p>
  </header>

  <main id="projects">

    <div class="cell">
      <div class="cell-label">
        <div class="num">과제 1</div>
        <div class="title">🌙 밤하늘 장면 (정적)</div>
      </div>
      <div class="iframe-wrap">
        <iframe src="project1/index.html"></iframe>
      </div>
    </div>

    <div class="cell">
      <div class="cell-label">
        <div class="num">과제 4</div>
        <div class="title">✨ 밤하늘 애니메이션</div>
      </div>
      <div class="iframe-wrap">
        <iframe src="project4/index.html"></iframe>
      </div>
    </div>

    <div class="cell">
      <div class="cell-label">
        <div class="num">과제 2</div>
        <div class="title">📷 카메라 캐리커처 (정적)</div>
      </div>
      <div class="iframe-wrap">
        <iframe src="project2/index.html"></iframe>
      </div>
    </div>

    <div class="cell">
      <div class="cell-label">
        <div class="num">과제 3</div>
        <div class="title">📸 인터랙티브 캐리커처</div>
      </div>
      <div class="iframe-wrap">
        <iframe src="project3/index.html"></iframe>
      </div>
    </div>

  </main>

  <footer>p5.js · GitHub Pages</footer>

</body>
</html>
